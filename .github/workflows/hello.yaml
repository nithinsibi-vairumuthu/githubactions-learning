name: Docker CI Pipeline

on: push

jobs:
  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-python-app .

      - name: Show Docker Images
        run: docker images

      - name: Run Container
        run: docker run my-python-app